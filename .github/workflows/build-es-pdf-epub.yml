name: Build ES EPUB & PDF (one-off)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc + TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-latex-recommended \
            texlive-fonts-recommended texlive-latex-extra

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Argos Translate + deps
        run: |
          python -m pip install --upgrade pip
          pip install argostranslate==1.9.6 markdown-it-py==3.0.0
          python -c "import argostranslate.package,urllib.request,os,tempfile; u='https://github.com/argosopentech/argos-translate/releases/download/v1.9/en_es.argosmodel'; d=os.path.join(tempfile.gettempdir(),'en_es.argosmodel'); urllib.request.urlretrieve(u,d); argostranslate.package.install_from_path(d)"

      - name: Prepare header/cover (PDF)
        run: |
          mkdir -p build
          # header.tex (encabezado/pie PDF)
          {
            echo '\usepackage{fancyhdr}';
            echo '\usepackage{graphicx}';
            echo '\pagestyle{fancy}';
            echo '\fancyhf{}';
            echo '\lhead{Agentic Design Patterns — Traducción técnica (ES)}';
            echo '\rfoot{\thepage}';
            echo '\setlength{\headheight}{14pt}';
          } > build/header.tex

          # cover.tex (portada PDF)
          {
            echo '\begin{titlepage}';
            echo '\centering';
            echo '\includegraphics[width=\textwidth]{assets/Agentic_Design_Patterns_Book_Cover.png}';
            echo '\end{titlepage}';
            echo '\clearpage';
          } > build/cover.tex

      - name: Translate Markdown (EN -> ES)
        run: |
          python -c "import re; from pathlib import Path; import argostranslate.translate as tr; root=Path('.'); c=sorted(root.glob('Agentic_Design_Patterns*.md')); 
text=c[0].read_text(encoding='utf-8') if c else (_ for _ in ()).throw(SystemExit('No se encontró el manuscrito compilado en la raíz.'));
FENCE=re.compile(r'```[\\s\\S]*?```',re.M); INLINE=re.compile(r'`[^`]+`'); fences=[]; inlines=[]; 
text=FENCE.sub(lambda m: fences.append(m.group(0)) or f'§§FENCE{len(fences)-1}§§', text); 
text=INLINE.sub(lambda m: inlines.append(m.group(0)) or f'§§INLINE{len(inlines)-1}§§', text);
def tp(p): 
    ps=p.strip(); 
    import re as _r; 
    return p if (not ps or ps.startswith('#') or _r.match(r'^\\s*(!?\\[.*?\\]\\(.*?\\))\\s*$', ps) or len(ps)<6) else tr.translate(p,'en','es');
parts=re.split(r'(\\n\\s*\\n)', text); 
parts[::2]=[tp(x) for x in parts[::2]]; 
text=''.join(parts); 
import re as _r; 
text=_r.sub(r'§§INLINE(\\d+)§§', lambda m: inlines[int(m.group(1))], text); 
text=_r.sub(r'§§FENCE(\\d+)§§', lambda m: fences[int(m.group(1))], text); 
Path('build').mkdir(exist_ok=True); Path('build/book-es.md').write_text(text, encoding='utf-8')"

      - name: Build EPUB (ES)
        run: |
          pandoc build/book-es.md \
            --from=gfm \
            --toc --toc-depth=3 \
            --resource-path=. \
            --metadata=title:"Agentic Design Patterns (Traducción técnica al español)" \
            --metadata=language:es-ES \
            --epub-cover-image=assets/Agentic_Design_Patterns_Book_Cover.png \
            -o build/Agentic_Design_Patterns_es.epub

      - name: Build PDF (ES, A4, header/footer)
        run: |
          pandoc build/book-es.md \
            --from=gfm \
            --toc --toc-depth=3 \
            --resource-path=. \
            --pdf-engine=xelatex \
            -V papersize:A4 -V geometry:margin=20mm \
            --include-in-header=build/header.tex \
            --include-before-body=build/cover.tex \
            -o build/Agentic_Design_Patterns_es.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Agentic-Design-Patterns-ES
          path: |
            build/*.epub
            build/*.pdf
