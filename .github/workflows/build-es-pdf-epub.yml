name: Build ES EPUB & PDF (one-off)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX
        run: sudo apt-get update && sudo apt-get install -y pandoc texlive-xetex texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-input argostranslate==1.11.0 markdown-it-py==3.0.0

      - name: Install Argos model (EN -> ES) via API
        run: python tools/install_model.py

      - name: Merge & translate chapters (EN -> ES)
        run: python tools/merge_and_translate.py

      - name: Build EPUB (ES)
        run: pandoc build/book-es.md --from=gfm --toc --toc-depth=3 --resource-path=. --metadata=title:"Agentic Design Patterns (Traduccion tecnica en espanol)" --metadata=language:es-ES --epub-cover-image=assets/Agentic_Design_Patterns_Book_Cover.png -o build/Agentic_Design_Patterns_es.epub

      - name: Build PDF (ES, A4, header/footer)
        run: pandoc build/book-es.md --from=gfm --toc --toc-depth=3 --resource-path=. --pdf-engine=xelatex -V papersize:A4 -V geometry:margin=20mm --include-in-header=tools/latex/header.tex --include-before-body=tools/latex/cover.tex -o build/Agentic_Design_Patterns_es.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Agentic-Design-Patterns-ES
          path: build/*
